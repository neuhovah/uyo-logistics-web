<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Uyo Logistics Intelligence</title>

    <meta name="title" content="Uyo Logistics Intelligence | Command Center">
    <meta name="description" content="An autonomous B2B Enterprise SaaS and Spatial Decision Support System (SDSS). Optimizing local delivery fleets and urban logistics in Akwa Ibom State.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://uyologistics.com/">
    <meta property="og:title" content="Uyo Logistics Intelligence | Command Center">
    <meta property="og:description" content="An autonomous B2B Enterprise SaaS and Spatial Decision Support System (SDSS). Optimizing local delivery fleets and urban logistics in Akwa Ibom State.">
    <meta property="og:image" content="https://uyologistics.com/preview-image.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://uyologistics.com/">
    <meta property="twitter:title" content="Uyo Logistics Intelligence | Command Center">
    <meta property="twitter:description" content="An autonomous B2B Enterprise SaaS and Spatial Decision Support System (SDSS). Optimizing local delivery fleets and urban logistics in Akwa Ibom State.">
    <meta property="twitter:image" content="https://uyologistics.com/preview-image.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex items-center justify-center h-screen bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
    
    <div class="bg-gray-800 p-8 md:p-10 rounded-2xl border border-gray-700 shadow-2xl w-[90%] max-w-md z-10 relative">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-blue-400 uppercase tracking-tighter">UYO LOGISTICS</h1>
            <p class="text-xs text-gray-400 uppercase tracking-widest mt-1">Command Center Access</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">
                    <i class="fa-solid fa-key text-blue-400 mr-1"></i> Corporate License Key
                </label>
                <div class="relative">
                    <input type="password" id="license-key" class="w-full bg-gray-900 text-white px-4 py-3 rounded-lg border border-gray-600 outline-none focus:border-blue-500 transition placeholder-gray-600 tracking-widest text-center font-mono" placeholder="XXXX-XXXX-XXXX">
                    <button type="button" onclick="toggleView()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-blue-400 transition outline-none">
                        <i id="toggle-icon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
                <p class="text-[9px] text-gray-500 text-center mt-2">Verify your key using the eye icon before initializing.</p>
            </div>

            <div id="error-message" class="text-red-400 text-xs font-bold text-center hidden bg-red-900/30 p-2 rounded border border-red-800"></div>

            <div class="pt-2">
                <button id="login-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-lg shadow-lg transition-all flex justify-center items-center gap-2">
                    Initialize Dashboard <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div class="mt-6 text-center border-t border-gray-700 pt-5">
            <p class="text-gray-400 text-[10px] mb-2 tracking-wide uppercase">Don't have a Corporate License?</p>
            <button onclick="requestTrial()" type="button" class="text-blue-400 hover:text-blue-300 font-bold text-xs uppercase tracking-wider transition-colors outline-none flex items-center justify-center gap-1 mx-auto">
                <i class="fa-solid fa-unlock-keyhole"></i> Request 24-Hour Trial Key
            </button>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://api.uyologistics.com";
        const errorDiv = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');
        const keyInput = document.getElementById('license-key');

        // --- REACTIVE UI OBSERVER ---
        // Automatically unlocks the button as soon as the user starts typing or pastes a key
        keyInput.addEventListener('input', () => {
            if (loginBtn.innerText === "Check your email to proceed" || loginBtn.disabled || document.getElementById('renew-plan')) {
                loginBtn.innerHTML = `Initialize Dashboard <i class="fa-solid fa-arrow-right"></i>`;
                loginBtn.disabled = false;
                loginBtn.style.backgroundColor = ""; // Reset to default blue-600 from CSS
                errorDiv.classList.add('hidden');
            }
        });

        function toggleView() {
            const icon = document.getElementById('toggle-icon');
            if (keyInput.type === "password") {
                keyInput.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                keyInput.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showError(message) {
            // Clean out any previous renewal forms before showing a standard error
            errorDiv.innerHTML = message;
            errorDiv.className = "text-red-400 text-xs font-bold text-center bg-red-900/30 p-2 rounded border border-red-800 mt-3";
            errorDiv.classList.remove('hidden');
            
            loginBtn.innerHTML = `Initialize Dashboard <i class="fa-solid fa-arrow-right"></i>`;
            loginBtn.disabled = false;
        }

        // --- 🚨 CRITICAL ENGINE: IN-DOM PAYSTACK RENEWAL ---
        // This function is triggered by a DIRECT user click, bypassing all browser pop-up blockers
        window.processRenewal = function(expiredKey) {
            const planChoice = document.getElementById('renew-plan').value;
            const userEmail = document.getElementById('renew-email').value.trim();
            
            if (!userEmail) { alert("⚠️ Please enter a business email for the receipt."); return; }

            let amountKobo, daysToAdd;
            if (planChoice === "1") { amountKobo = 300000; daysToAdd = 1; }
            else if (planChoice === "2") { amountKobo = 2500000; daysToAdd = 14; }
            else if (planChoice === "3") { amountKobo = 5000000; daysToAdd = 30; }

            const handler = PaystackPop.setup({
                key: 'pk_test_c84a971d6679a03491b013d7cb2a51b8cc1bbebd',
                email: userEmail,
                amount: amountKobo,
                currency: "NGN",
                ref: 'UYO-' + Math.floor((Math.random() * 1000000000) + 1),
                callback: async function(response) {
                    try {
                        const updateRes = await fetch(`${API_BASE_URL}/api/vrp/activate-license`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                reference: response.reference, 
                                license_key: expiredKey,
                                days_to_add: daysToAdd 
                            })
                        });
                        
                        if (updateRes.ok) {
                            alert(`✅ Plan Activated! Access extended by ${daysToAdd} day(s).`);
                            localStorage.setItem('uyo_license_key', expiredKey);
                            window.location.replace("index.html"); 
                        } else {
                            alert("⚠️ Payment confirmed but license activation failed. Please contact support.");
                        }
                    } catch (err) {
                        alert("⚠️ Network error during activation verification.");
                    }
                },
                onClose: function() {
                    alert("Transaction cancelled. Optimization remains locked.");
                }
            });
            handler.openIframe();
        };

        async function handleLogin() {
            const key = keyInput.value.trim();
            if (!key) return showError("Please enter a License Key.");

            errorDiv.classList.add('hidden');
            loginBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Verifying...`;
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/vrp/verify-key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-license-key': key }
                });

                if (response.ok) {
                    localStorage.setItem('uyo_license_key', key);
                    window.location.replace("index.html");
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    
                    // 🚨 THE TRAP: Catch 402 or explicit expiration messages and inject DOM form
                    if (response.status === 402 || (errorData.detail && errorData.detail.toLowerCase().includes('expired'))) {
                        
                        loginBtn.innerHTML = `Initialize Dashboard <i class="fa-solid fa-arrow-right"></i>`;
                        loginBtn.disabled = false;
                        
                        // Inject the renewal UI directly into the DOM
                        errorDiv.innerHTML = `
                            <div class="text-left mt-2">
                                <p class="text-white font-bold text-[11px] mb-2 uppercase border-b border-red-800 pb-1">
                                    <i class="fa-solid fa-triangle-exclamation text-red-400"></i> License Expired. Renew Below:
                                </p>
                                <select id="renew-plan" class="w-full text-xs bg-gray-900 text-white p-2 rounded mb-2 border border-red-800 outline-none focus:border-red-500">
                                    <option value="1">Daily Pass - ₦3,000</option>
                                    <option value="2">Bi-Weekly Pro - ₦25,000</option>
                                    <option value="3">Monthly Enterprise - ₦50,000</option>
                                </select>
                                <input type="email" id="renew-email" placeholder="Enter Business Email" class="w-full text-xs bg-gray-900 text-white p-2 rounded mb-3 border border-red-800 outline-none focus:border-red-500">
                                <button onclick="processRenewal('${key}')" class="w-full bg-green-600 hover:bg-green-500 text-white text-xs font-bold py-3 rounded shadow transition-all flex justify-center items-center gap-2">
                                    <i class="fa-solid fa-credit-card"></i> Pay & Reactivate
                                </button>
                            </div>
                        `;
                        // Ensure styling accommodates the new form
                        errorDiv.className = "bg-gray-800 p-3 rounded border border-red-800 mt-4 shadow-inner";
                        errorDiv.classList.remove('hidden');

                    } else {
                        // Throw standard errors (like "Invalid Key") to the catch block
                        throw new Error(errorData.detail || "Access Denied");
                    }
                }
            } catch (err) {
                // If the Chrome extension crashes the promise, 'err.message' might be the listener error.
                // We fallback to a generic message to prevent exposing ugly browser console errors to the user.
                let displayMsg = err.message;
                if (displayMsg.includes("listener indicated")) displayMsg = "Network disruption. Please try again.";
                showError(displayMsg);
            }
        }

        async function requestTrial() {
            const userEmail = prompt("Enter your business email to receive your 24-Hour Trial Key:");
            if (!userEmail) return;

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(userEmail.trim())) {
                alert("⚠️ Please enter a valid email address.");
                return; 
            }

            const originalBtnText = loginBtn.innerHTML;
            loginBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Dispatching...`;
            loginBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/api/customers/generate-trial`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail.trim() })
                });

                if (response.ok) {
                    alert(`📩 KEY DISPATCHED!\n\nPlease check your inbox for ${userEmail}.`);
                    loginBtn.innerText = "Check your email to proceed";
                    loginBtn.disabled = true; 
                    loginBtn.style.backgroundColor = "#1e293b"; 
                } else {
                    const errData = await response.json().catch(() => ({}));
                    alert(`⚠️ Action Denied: ${errData.detail || "Could not generate trial."}`);
                    loginBtn.innerHTML = originalBtnText;
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error("Trial Error:", error);
                alert("Network error.");
                loginBtn.innerHTML = originalBtnText;
                loginBtn.disabled = false;
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        keyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
