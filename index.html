<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uyo Logistics Intelligence | Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <style>
        /* --- PROFESSIONAL SEQUENCE MARKERS --- */
        .seq-marker {
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease;
        }
        .seq-marker:hover { transform: scale(1.2); z-index: 1000 !important; }

        /* --- LEAFLET DARK MODE OVERRIDES --- */
        .leaflet-control-layers {
            background: #1f2937 !important; color: white !important;
            border: 1px solid #374151 !important; border-radius: 8px !important; padding: 10px !important;
        }

        /* --- GLASSMORPHISM SCROLLBAR --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="p-4 md:p-6 bg-gray-800 border-b border-gray-700 flex flex-col lg:flex-row justify-between items-center gap-4 sticky top-0 z-[1000]">
        <div class="text-center lg:text-left w-full lg:w-auto">
            <h1 class="text-xl md:text-2xl font-bold text-blue-400 uppercase tracking-tighter">UYO LOGISTICS INTELLIGENCE</h1>
            <p class="text-xs md:text-sm text-gray-400 uppercase tracking-widest">Autonomous Route Optimization Engine</p>
        </div>
        <div class="flex flex-wrap justify-center lg:justify-end gap-2 w-full lg:w-auto">
            <select id="vehicle-select" class="flex-grow md:flex-none text-sm bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600 outline-none focus:border-blue-500 transition cursor-pointer">
                <option value="all">Mixed Fleet (Auto)</option>
                <option value="bike">Bikes Only</option>
                <option value="van">Vans Only</option>
            </select>

            <button onclick="clearUnassignedPins()" class="flex-grow md:flex-none bg-gray-700 hover:bg-gray-600 border border-gray-600 text-gray-200 text-sm md:text-base px-4 py-2 rounded-lg font-bold transition shadow-lg">
                Clear Pins
            </button>
            
            <button onclick="solveAndDisplay()" class="flex-grow md:flex-none w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-sm md:text-base px-6 py-2 rounded-lg font-bold transition shadow-lg flex items-center justify-center gap-2">
                Optimize Routes
            </button>
        </div>
    </header>

    <main class="p-4 md:p-6 flex flex-col lg:grid lg:grid-cols-12 gap-4 md:gap-6">
        
        <div class="lg:col-span-3 bg-gray-800 p-4 rounded-xl border border-gray-700 overflow-y-auto order-2 lg:order-1" style="max-height: 600px;">
            <div id="bi-dashboard" class="mb-6 space-y-3 border-b border-gray-700 pb-6">
                <h3 class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Operational Intelligence</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-gray-900 p-2 rounded-lg border border-gray-700 shadow-inner">
                        <p class="text-gray-500 text-[8px] font-bold uppercase">Fuel Saved</p>
                        <p id="stat-fuel" class="text-green-400 text-sm font-mono font-black">₦0</p>
                    </div>
                    <div class="bg-gray-900 p-2 rounded-lg border border-gray-700 shadow-inner">
                        <p class="text-gray-500 text-[8px] font-bold uppercase">Efficiency</p>
                        <p id="stat-efficiency" class="text-blue-400 text-sm font-mono font-black">0%</p>
                    </div>
                </div>
                <div class="p-2 bg-gray-900 rounded-lg border border-gray-700">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-gray-500 text-[8px] font-bold uppercase">CO2 Offset</p>
                        <span id="stat-co2" class="text-white text-[10px] font-bold">0.0 kg</span>
                    </div>
                    <div class="w-full bg-gray-700 h-1 rounded-full overflow-hidden">
                        <div id="co2-bar" class="bg-green-500 h-full w-0 transition-all duration-1000"></div>
                    </div>
                </div>
            </div>

            <div id="report-container" class="mt-4 mb-4 p-4 bg-gray-800 rounded-xl border border-blue-500 shadow-lg" style="display: none;">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-bold text-white uppercase tracking-wider">Optimization Complete</h3>
                    <span class="text-green-400 text-xs font-black"><i class="fa-solid fa-check-circle"></i></span>
                </div>
                <p class="text-xs text-gray-400 mb-3">Survey-grade route manifest generated.</p>
                <button id="download-report-btn" class="w-full py-2.5 bg-green-600 hover:bg-green-500 text-white text-xs font-bold rounded shadow transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-csv"></i> Download CSV
                </button>
            </div>

            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-200">Active Fleet</h2>
                <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
            </div>
            
            <div id="fleet-list" class="space-y-4">
                <p class="text-gray-500 text-xs italic text-center py-10">Ready for dispatch...</p>
            </div>
        </div>

        <div class="lg:col-span-9 relative rounded-xl border border-gray-700 overflow-hidden shadow-2xl order-1 lg:order-2 h-[60vh] lg:h-[600px]">
            
            <div class="absolute top-4 left-1/2 transform -translate-x-1/2 z-[2000] w-[90%] md:w-96 bg-gray-800 rounded-lg shadow-2xl border border-gray-600 flex overflow-hidden">
                <input type="text" id="custom-search" class="w-full bg-transparent text-white px-3 md:px-5 py-2 md:py-3 outline-none text-xs md:text-sm placeholder-gray-400" placeholder="Search Uyo (e.g. Oron Road)...">
                <button onclick="executeSearch()" class="bg-blue-600 px-4 md:px-6 text-white hover:bg-blue-500 transition flex items-center justify-center">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div id="map" class="h-full w-full z-[1]"></div>
        </div>
    </main>

    <script src="app.js?v=4"></script>
</body>
</html>
