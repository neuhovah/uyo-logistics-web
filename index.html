<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uyo Logistics Intelligence | Command Center</title>

    <meta name="title" content="Uyo Logistics Intelligence | Command Center">
    <meta name="description" content="An autonomous B2B Enterprise SaaS and Spatial Decision Support System (SDSS). Optimizing local delivery fleets and urban logistics in Akwa Ibom State.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://uyologistics.com/">
    <meta property="og:title" content="Uyo Logistics Intelligence | Command Center">
    <meta property="og:description" content="An autonomous B2B Enterprise SaaS and Spatial Decision Support System (SDSS). Optimizing local delivery fleets and urban logistics in Akwa Ibom State.">
    <meta property="og:image" content="https://uyologistics.com/preview-image.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://uyologistics.com/">
    <meta property="twitter:title" content="Uyo Logistics Intelligence | Command Center">
    <meta property="twitter:description" content="An autonomous B2B Enterprise SaaS and Spatial Decision Support System (SDSS). Optimizing local delivery fleets and urban logistics in Akwa Ibom State.">
    <meta property="twitter:image" content="https://uyologistics.com/preview-image.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>
    
    <style>
        .seq-marker { display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
        .seq-marker:hover { transform: scale(1.2); z-index: 1000 !important; }
        .leaflet-control-layers { background: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 8px !important; padding: 10px !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="p-4 md:p-6 bg-gray-800 border-b border-gray-700 flex flex-col lg:flex-row justify-between items-center gap-4 sticky top-0 z-[1000]">
        <div class="text-center lg:text-left w-full lg:w-auto">
            <h1 class="text-xl md:text-2xl font-bold text-blue-400 uppercase tracking-tighter">UYO LOGISTICS INTELLIGENCE</h1>
            <p class="text-xs md:text-sm text-gray-400 uppercase tracking-widest">Autonomous Route Optimization Engine</p>
        </div>
        <div class="flex flex-wrap justify-center lg:justify-end gap-2 w-full lg:w-auto">
            <button onclick="logout()" class="text-xs text-gray-400 hover:text-white mr-4 transition-colors uppercase font-bold tracking-widest">Logout</button>
            <select id="vehicle-select" class="flex-grow md:flex-none text-sm bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600 outline-none focus:border-blue-500 transition cursor-pointer">
                <option value="all">Mixed Fleet (Auto)</option>
                <option value="bike">Bikes Only</option>
                <option value="van">Vans Only</option>
            </select>
            <button onclick="clearUnassignedPins()" class="bg-gray-700 hover:bg-gray-600 border border-gray-600 text-gray-200 text-sm px-4 py-2 rounded-lg font-bold transition">Clear Pins</button>
            <button id="optimize-btn" onclick="solveAndDisplay()" class="bg-blue-600 hover:bg-blue-500 text-sm px-6 py-2 rounded-lg font-bold transition flex items-center gap-2">
                Optimize Routes
            </button>
        </div>
    </header>

    <main class="p-4 md:p-6 flex flex-col lg:grid lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3 bg-gray-800 p-4 rounded-xl border border-gray-700 h-fit">
            <div id="bi-dashboard" class="mb-6 space-y-3 border-b border-gray-700 pb-6">
                <h3 class="text-blue-400 text-[10px] font-black uppercase tracking-widest tracking-tighter">Operational Intelligence</h3>
                <div class="grid grid-cols-3 gap-1.5">
                    <div class="bg-gray-900 p-2 rounded-lg border border-gray-700 text-center">
                        <p class="text-gray-500 text-[7px] font-bold uppercase">Fuel Saved</p>
                        <p id="stat-fuel" class="text-green-400 text-[11px] font-mono font-black">₦0</p>
                    </div>
                    <div class="bg-gray-900 p-2 rounded-lg border border-gray-700 text-center">
                        <p class="text-gray-500 text-[7px] font-bold uppercase">Efficiency</p>
                        <p id="stat-efficiency" class="text-blue-400 text-[11px] font-mono font-black">0%</p>
                    </div>
                    <div class="bg-gray-900 p-2 rounded-lg border border-gray-700 text-center">
                        <p class="text-gray-500 text-[7px] font-bold uppercase">CO2 Saved</p>
                        <p id="stat-co2" class="text-red-400 text-[11px] font-mono font-black">0 kg</p>
                    </div>
                </div>
            </div>
            
            <div id="report-container" class="mt-4 mb-4 p-4 bg-gray-800 rounded-xl border border-blue-500 shadow-lg" style="display: none;">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-bold text-white uppercase tracking-wider">Optimization Complete</h3>
                    <span class="text-green-400 text-xs font-black"><i class="fa-solid fa-check-circle"></i></span>
                </div>
                <p class="text-xs text-gray-400 mb-3">Survey-grade route manifest generated.</p>
                <button id="download-report-btn" class="w-full py-2.5 bg-green-600 hover:bg-green-500 text-white text-xs font-bold rounded shadow transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-csv"></i> Download CSV
                </button>
            </div>

            <h2 class="text-lg font-bold text-gray-200 mb-4 flex items-center justify-between">
                Active Fleet <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
            </h2>
            <div id="fleet-list" class="space-y-4 text-xs text-gray-500 italic">Ready for dispatch...</div>
        </div>

        <div class="lg:col-span-9 relative rounded-xl border border-gray-700 overflow-hidden shadow-2xl h-[70vh]">
            
            <div class="absolute top-4 left-1/2 transform -translate-x-1/2 z-[2000] w-[90%] md:w-96 bg-gray-800 rounded-lg shadow-2xl border border-gray-600 flex overflow-hidden">
                <input type="text" id="custom-search" class="w-full bg-transparent text-white px-3 md:px-5 py-2 md:py-3 outline-none text-xs md:text-sm placeholder-gray-400" placeholder="Search Uyo (e.g. Oron Road)...">
                <button onclick="executeSearch()" class="bg-blue-600 px-4 md:px-6 text-white hover:bg-blue-500 transition flex items-center justify-center">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div id="map" class="h-full w-full z-[1]"></div>
        </div>
    </main>

    <script>
        // Ensure the user cannot bypass the login screen
        if (!localStorage.getItem('uyo_license_key')) {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem('uyo_license_key');
            window.location.href = "login.html";
        }
    </script>
    
    <script src="app.js?v=7"></script> 
</body>
</html>
