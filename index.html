<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uyo Logistics Intelligence | Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>
    
    <style>
        .seq-marker { display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
        .seq-marker:hover { transform: scale(1.2); z-index: 1000 !important; }
        .leaflet-control-layers { background: #1f2937 !important; color: white !important; border: 1px solid #374151 !important; border-radius: 8px !important; padding: 10px !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="p-4 md:p-6 bg-gray-800 border-b border-gray-700 flex flex-col lg:flex-row justify-between items-center gap-4 sticky top-0 z-[1000]">
        <div class="text-center lg:text-left w-full lg:w-auto">
            <h1 class="text-xl md:text-2xl font-bold text-blue-400 uppercase tracking-tighter">UYO LOGISTICS INTELLIGENCE</h1>
            <p class="text-xs md:text-sm text-gray-400 uppercase tracking-widest">Autonomous Route Optimization Engine</p>
        </div>
        <div class="flex flex-wrap justify-center lg:justify-end gap-2 w-full lg:w-auto">
            <button onclick="logout()" class="text-xs text-gray-400 hover:text-white mr-4 transition-colors uppercase font-bold tracking-widest">Logout</button>
            <select id="vehicle-select" class="flex-grow md:flex-none text-sm bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600 outline-none focus:border-blue-500 transition cursor-pointer">
                <option value="all">Mixed Fleet (Auto)</option>
                <option value="bike">Bikes Only</option>
                <option value="van">Vans Only</option>
            </select>
            <button onclick="clearPins()" class="bg-gray-700 hover:bg-gray-600 border border-gray-600 text-gray-200 text-sm px-4 py-2 rounded-lg font-bold transition">Clear Pins</button>
            <button id="optimize-btn" onclick="solveAndDisplay()" class="bg-blue-600 hover:bg-blue-500 text-sm px-6 py-2 rounded-lg font-bold transition flex items-center gap-2">
                Optimize Routes
            </button>
        </div>
    </header>

    <main class="p-4 md:p-6 flex flex-col lg:grid lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3 bg-gray-800 p-4 rounded-xl border border-gray-700 h-fit">
            <div id="bi-dashboard" class="mb-6 space-y-3 border-b border-gray-700 pb-6">
                <h3 class="text-blue-400 text-[10px] font-black uppercase tracking-widest tracking-tighter">Operational Intelligence</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-gray-900 p-2 rounded-lg border border-gray-700">
                        <p class="text-gray-500 text-[8px] font-bold uppercase">Fuel Saved</p>
                        <p id="stat-fuel" class="text-green-400 text-sm font-mono font-black">₦0</p>
                    </div>
                    <div class="bg-gray-900 p-2 rounded-lg border border-gray-700">
                        <p class="text-gray-500 text-[8px] font-bold uppercase">Efficiency</p>
                        <p id="stat-efficiency" class="text-blue-400 text-sm font-mono font-black">0%</p>
                    </div>
                </div>
            </div>
            <h2 class="text-lg font-bold text-gray-200 mb-4 flex items-center justify-between">
                Active Fleet <span class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
            </h2>
            <div id="fleet-list" class="space-y-4 text-xs text-gray-500 italic">Ready for dispatch...</div>
        </div>

        <div class="lg:col-span-9 relative rounded-xl border border-gray-700 overflow-hidden shadow-2xl h-[70vh]">
            <div id="map" class="h-full w-full z-[1]"></div>
        </div>
    </main>

    <script>
        // --- TARGET LOCK CONFIG ---
        const API_BASE_URL = "https://uyo-routing-engine.onrender.com";
        let map, deliveryPoints = [], markers = [];

        // --- PAGE LOAD SECURITY CHECK ---
        if (!localStorage.getItem('uyo_license_key')) {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem('uyo_license_key');
            window.location.href = "login.html";
        }

        // --- INITIALIZE MAP ---
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([5.03, 7.92], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            map.on('click', (e) => {
                const marker = L.marker(e.latlng).addTo(map);
                deliveryPoints.push({ lat: e.latlng.lat, lon: e.latlng.lng });
                markers.push(marker);
            });
        }

        function clearPins() {
            markers.forEach(m => map.removeLayer(m));
            deliveryPoints = [];
            markers = [];
        }

        // --- THE SOLVER (DYNAMIC HEADER ATTACHMENT) ---
        async function solveAndDisplay() {
            if (deliveryPoints.length < 2) return alert("Please drop at least 2 pins on the map.");

            const btn = document.getElementById('optimize-btn');
            
            // 1. SURGICAL FIX: Grab the key fresh at the exact moment of optimization
            const currentLicenseKey = localStorage.getItem('uyo_license_key');

            // 2. Emergency eject if key has vanished from storage
            if (!currentLicenseKey) {
                alert("Session Expired. Please log in again.");
                logout();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Solving VRP...`;

            const payload = {
                depot: deliveryPoints[0],
                deliveries: deliveryPoints.slice(1),
                fleet: [
                    { id: "Van-01", type: "van", capacity: 10 },
                    { id: "Bike-01", type: "bike", capacity: 5 }
                ]
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/vrp/solve-dynamic`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-license-key': currentLicenseKey // <--- 3. Injecting the dynamically retrieved key
                    },
                    body: JSON.stringify(payload)
                });

                // Handle specifically defined security rejections from the backend
                if (response.status === 401 || response.status === 402) {
                    const errData = await response.json().catch(() => ({detail: "Invalid or Expired License Key."}));
                    alert(`🚫 ACCESS DENIED: ${errData.detail}`);
                    logout();
                    return;
                }

                if (!response.ok) throw new Error("VRP Engine Error");

                const result = await response.json();
                renderRoutes(result.routes);
                updateStats(result.total_distance);

            } catch (err) {
                console.error(err);
                alert("Critical: Could not connect to Uyo VRP Engine.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Optimize Routes`;
            }
        }

        function renderRoutes(routes) {
            routes.forEach(route => {
                const color = route.vehicle_id.includes('Bike') ? '#60a5fa' : '#34d399';
                L.polyline(route.path, { color: color, weight: 4, opacity: 0.8 }).addTo(map);
            });
        }

        function updateStats(dist) {
            document.getElementById('stat-fuel').innerText = `₦${Math.round(dist * 150).toLocaleString()}`;
            document.getElementById('stat-efficiency').innerText = `94.2%`;
        }

        window.onload = initMap;
    </script>
</body>
</html>
