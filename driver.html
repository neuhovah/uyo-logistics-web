<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uyo Logistics | Driver Mission</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzNiODJmNiIvPjx0ZXh0IHg9IjUwIiB5PSI3MiIgZm9udC1zaXplPSI2NSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXdlaWdodD0iYm9sZCI+VTwvdGV4dD48L3N2Zz4=">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        /* Prevent text selection and zooming on mobile */
        * { user-select: none; touch-action: manipulation; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-6">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">UYO LOGISTICS</h1>
            <p class="text-xs text-gray-400 uppercase tracking-widest">Driver Mission Interface</p>
        </div>
        <div id="connection-status" class="w-3 h-3 bg-red-500 rounded-full status-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
    </div>

    <div id="offline-warning" class="hidden bg-orange-600 text-white text-xs font-bold text-center py-2 px-4 rounded-xl mb-4 shadow-lg animate-pulse">
        <i class="fa-solid fa-triangle-exclamation mr-2"></i> Cellular Connection Lost. Reconnecting...
    </div>

    <div class="bg-gray-800 rounded-3xl p-6 shadow-2xl border border-gray-700 mb-6 relative overflow-hidden">
        <div class="flex justify-between items-start mb-4 relative z-10">
            <h2 id="vehicle-id" class="text-xl font-bold text-gray-100">---</h2>
            <span class="bg-blue-600/20 text-blue-400 text-[10px] px-2 py-1 rounded font-bold border border-blue-500/30">ACTIVE MISSION</span>
        </div>
        
        <div class="space-y-4 mb-6 relative z-10">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-location-crosshairs text-gray-500" id="gps-icon"></i>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase font-bold">Telemetry Status</p>
                    <p id="telemetry-log" class="text-sm font-mono text-gray-300">Waiting for GPS lock...</p>
                </div>
            </div>
        </div>

        <button onclick="startNavigation()" id="nav-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold rounded-2xl shadow-[0_4px_20px_rgba(37,99,235,0.4)] transition-all flex items-center justify-center gap-3 relative z-10">
            <i class="fa-solid fa-map-location-dot"></i>
            <span>START NAVIGATION</span>
        </button>
    </div>

    <div class="mt-auto bg-blue-900/20 border border-blue-800/50 p-4 rounded-2xl">
        <p class="text-[11px] text-blue-300 leading-relaxed font-medium">
            <i class="fa-solid fa-shield-halved mr-1"></i>
            Keep this device plugged into power. <br><br>
            <i class="fa-solid fa-circle-info mr-1"></i>
            Do not close this tab. The Command Center requires this page to remain open to track your vehicle accurately.
        </p>
    </div>

    <script>
        // --- SECURE ENTERPRISE DOMAIN UPGRADE ---
        // 🚨 CRITICAL FIX: Swapped to Production Domains (Vercel Reverse Proxy enabled)
        const API_BASE_URL = "";
        
        const urlParams = new URLSearchParams(window.location.search);
        const vehicleId = urlParams.get('v') || "UNKNOWN-VEH";
        const gmapsUrl = urlParams.get('map') || "#";

        document.getElementById('vehicle-id').innerText = vehicleId;

        // 🚨 CRITICAL FIX 1: WakeLock API (Prevent Screen Sleep)
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('✅ Screen Wake Lock activated');
                }
            } catch (err) {
                console.warn(`Wake Lock error: ${err.name}, ${err.message}`);
            }
        }

        // Re-acquire WakeLock if the driver minimizes and maximizes the browser
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // 🚨 CRITICAL FIX 2: Connection Listeners
        window.addEventListener('offline', () => {
            document.getElementById('offline-warning').classList.remove('hidden');
            document.getElementById('connection-status').classList.replace('bg-green-500', 'bg-orange-500');
            document.getElementById('connection-status').style.boxShadow = '0 0 10px rgba(249,115,22,0.8)';
        });

        window.addEventListener('online', () => {
            document.getElementById('offline-warning').classList.add('hidden');
            document.getElementById('connection-status').classList.replace('bg-orange-500', 'bg-green-500');
            document.getElementById('connection-status').style.boxShadow = '0 0 10px rgba(34,197,94,0.8)';
        });

        function startNavigation() {
            requestWakeLock(); 
            const navBtn = document.getElementById('nav-btn');
            navBtn.innerHTML = `<i class="fa-solid fa-route fa-beat"></i> <span>NAVIGATION ACTIVE</span>`;
            navBtn.classList.replace('bg-blue-600', 'bg-green-600');
            navBtn.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
            navBtn.style.boxShadow = '0 4px 20px rgba(34,197,94,0.4)';
            
            // Open Google Maps
            window.open(decodeURIComponent(gmapsUrl), '_blank');
            startTracking();
        }

        function startTracking() {
            if ("geolocation" in navigator) {
                
                const geoOptions = {
                    enableHighAccuracy: true,
                    maximumAge: 5000, 
                    timeout: 10000 
                };

                navigator.geolocation.watchPosition(async (position) => {
                    const statusDot = document.getElementById('connection-status');
                    const gpsIcon = document.getElementById('gps-icon');
                    
                    statusDot.classList.replace('bg-red-500', 'bg-green-500');
                    statusDot.style.boxShadow = '0 0 10px rgba(34,197,94,0.8)';
                    gpsIcon.classList.replace('text-gray-500', 'text-blue-400');

                    const payload = {
                        vehicle_id: vehicleId,
                        lat: position.coords.latitude,
                        lon: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        speed: position.coords.speed || 0 
                    };

                    // 🚨 CRITICAL FIX 3: Tactical Timeout for Cellular Drops
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000); // 8-second mobile limit

                    try {
                        const response = await fetch(`${API_BASE_URL}/api/telemetry/update`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            signal: controller.signal
                        });
                        
                        clearTimeout(timeoutId);
                        
                        if (response.ok) {
                            document.getElementById('telemetry-log').innerHTML = `<span class="text-green-400">Sync OK</span> • [${payload.lat.toFixed(5)}, ${payload.lon.toFixed(5)}]`;
                        }
                    } catch (err) {
                        clearTimeout(timeoutId);
                        if (err.name === 'AbortError') {
                            document.getElementById('telemetry-log').innerHTML = `<span class="text-orange-400">Cellular Delay</span> • Retrying...`;
                        } else {
                            document.getElementById('telemetry-log').innerHTML = `<span class="text-red-400">Sync Error</span> • Network unstable`;
                        }
                    }
                }, (error) => {
                    // Graceful Error Trapping
                    const log = document.getElementById('telemetry-log');
                    const icon = document.getElementById('gps-icon');
                    icon.classList.replace('text-blue-400', 'text-red-500');
                    
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            log.innerHTML = `<span class="text-red-500 font-bold">GPS Permission Denied.</span> Please allow location.`;
                            break;
                        case error.POSITION_UNAVAILABLE:
                            log.innerHTML = `<span class="text-orange-400">GPS Signal Lost.</span> Move to open sky.`;
                            break;
                        case error.TIMEOUT:
                            log.innerHTML = `<span class="text-orange-400">GPS Timeout.</span> Locating satellites...`;
                            break;
                    }
                }, geoOptions);
            } else {
                document.getElementById('telemetry-log').innerHTML = `<span class="text-red-500">Device not supported.</span>`;
            }
        }
    </script>
</body>
</html>
